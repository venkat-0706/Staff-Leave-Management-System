<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Staff | SLMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    padding:40px;
    background:linear-gradient(120deg,#dfe9f3,#ffffff,#d8cfff);
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    font-size:40px;
    color:#111827;
}

.add-btn{
    background:#1d72d8;
    color:white;
    padding:12px 25px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.add-btn:hover{
    background:#155bb5;
}

.search-box{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
    margin-bottom:20px;
}

.search-box form{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.search-box input{
    flex:1;
    min-width:250px;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
}

.search-btn{
    background:#1d72d8;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:500;
}

.search-btn:hover{
    background:#155bb5;
}

.clear-btn{
    background:#6b7280;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:500;
}

.clear-btn:hover{
    background:#4b5563;
}

.card{
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
    overflow:hidden;
}

.staff-count{
    margin-bottom:15px;
    font-weight:600;
    color:#374151;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f3f4f6;
    padding:15px;
    text-align:left;
}

td{
    padding:15px;
    border-bottom:1px solid #e5e7eb;
}

.edit{
    background:#f59e0b;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    text-decoration:none;
    margin-right:8px;
}

.edit:hover{
    background:#d97706;
}

.delete{
    background:#ef4444;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    text-decoration:none;
}

.delete:hover{
    background:#dc2626;
}

.back{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    color:#1d72d8;
    font-weight:600;
}

.back:hover{
    text-decoration:underline;
}

.empty-message{
    text-align:center;
    padding:20px;
    color:#6b7280;
}

@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }

    table{
        font-size:14px;
    }

    .edit,
    .delete{
        display:inline-block;
        margin-top:5px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="header">

        <h1>Manage Staff</h1>

        <a href="{% url 'add_staff' %}" class="add-btn">
            + Add Staff
        </a>

    </div>

    <!-- Search Section -->
    <div class="search-box">

        <form method="GET">

            <input
                type="text"
                name="q"
                placeholder="Search by username or email..."
                value="{{ query }}"
            >

            <button type="submit" class="search-btn">
                Search
            </button>

            <a href="{% url 'manage_staff' %}" class="clear-btn">
                Clear
            </a>

        </form>

    </div>

    <div class="card">

        <div class="staff-count">
            Total Staff Found: {{ staff_list.count }}
        </div>

        <table>

            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>

            {% for i in staff_list %}

            <tr>

                <td>{{ i.username }}</td>
                <td>{{ i.email }}</td>

                <td>

                    <a href="{% url 'edit_staff' i.id %}" class="edit">
                        Edit
                    </a>

                    <a href="{% url 'delete_staff' i.id %}"
                       class="delete"
                       onclick="return confirm('Are you sure you want to delete this staff member?')">
                        Delete
                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>
                <td colspan="3" class="empty-message">
                    No Staff Found
                </td>
            </tr>

            {% endfor %}

        </table>

        <a href="{% url 'admin_dashboard' %}" class="back">
            ← Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
