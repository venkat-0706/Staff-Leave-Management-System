<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLMS | Apply Leave</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,#b4c8f0,#eef2ff,#d9c7ff);
    padding:20px;
}

.container{
    width:650px;
    max-width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:50px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

h1{
    font-size:45px;
    color:#0f172a;
    margin-bottom:10px;
    text-align:center;
}

.sub{
    text-align:center;
    color:#6b7280;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border-radius:15px;
    border:1px solid #d1d5db;
    background:#eef2ff;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#2374dd;
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1d5fc4;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#2374dd;
    text-decoration:none;
    font-weight:600;
}

.back:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="container">

    <h1>Apply Leave</h1>

    <p class="sub">
        Fill in your leave details below
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>User Name</label>
            <input type="text"
                   name="username"
                   placeholder="Enter your username"
                   required>
        </div>

        <div class="form-group">
            <label>Leave Type</label>
            <select name="leave_type" required>
                <option value="">Select Leave Type</option>
                <option>Casual Leave</option>
                <option>Sick Leave</option>
                <option>Emergency Leave</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   placeholder="Enter your email"
                   required>
        </div>

        <div class="form-group">
            <label>Start Date</label>
            <input type="date"
                   name="start_date"
                   required>
        </div>

        <div class="form-group">
            <label>End Date</label>
            <input type="date"
                   name="end_date"
                   required>
        </div>

        <div class="form-group">
            <label>Reason</label>
            <textarea name="reason"
                      placeholder="Enter reason for leave"
                      required></textarea>
        </div>

        <button type="submit">
            Apply Leave
        </button>

    </form>

    <a href="{% url 'staff_dashboard' %}" class="back">
        ← Back to Home
    </a>

</div>

</body>
</html>
